name: Build, Sign & Release CleanShot

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  id-token: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-sign-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r clean-shot/requirements.txt
          pip install pyinstaller pywin32 pyttsx3

      - name: Build exe with PyInstaller
        run: |
          pyinstaller clean-shot/cleanshot.spec

      - name: Log in to Azure (federated OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign exe with Azure Artifact Signing
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: CleanShotHQLLC
          certificate-profile-name: CleanShotHQCert
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload signed exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CleanShot.exe
          name: CleanShot ${{ github.ref_name }}
          body: |
            ## CleanShot ${{ github.ref_name }}

            Signed and verified by **CLEANSHOTHQ LLC** via Microsoft Azure Artifact Signing.
            No SmartScreen warnings. No antivirus false positives.

            ### Install
            Download `CleanShot.exe` below and run it directly — no installation required.

            ### What's new
            See [CHANGELOG.md](https://github.com/arbymcpatriot3/CleanShot/blob/main/clean-shot/CHANGELOG.md) for full details.
